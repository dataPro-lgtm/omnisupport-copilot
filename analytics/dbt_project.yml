name: "omnisupport_analytics"
version: "1.0.0"
config-version: 2

profile: "omnisupport_analytics"

model-paths: ["models"]
test-paths: ["tests"]
analysis-paths: ["analyses"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  omnisupport_analytics:
    staging:
      +materialized: view
      +tags: ["week05", "staging"]
    intermediate:
      +materialized: view
      +tags: ["week05", "intermediate"]
    marts:
      +materialized: table
      +tags: ["week05", "marts"]

vars:
  week05_data_release_id: "{{ env_var('WEEK05_DATA_RELEASE_ID', 'week05-dev-local') }}"
